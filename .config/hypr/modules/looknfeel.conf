#####################
### LOOK AND FEEL ###
#####################

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    # gaps_in = 1
    # gaps_out = 5
    #
    # border_size = 1

    gaps_in = 0
    gaps_out = 0

    border_size = 0

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = $tertiary
    col.inactive_border = $secondary

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# source = ./decorations/focused.conf

decoration {
    rounding = 0
    rounding_power = 0

    active_opacity = 1
    inactive_opacity = 1


    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}
# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = false

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 6, myBezier 
    animation = windowsIn, 1, 7, myBezier, slide
    animation = windowsOut, 1, 7, default, slide
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = fadeLayersIn, 1, 3, default
    animation = fadeLayersOut, 1, 4, default
    animation = workspaces, 1, 4, default
    animation = specialWorkspace, 1, 4, default, slidevert 80%
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

