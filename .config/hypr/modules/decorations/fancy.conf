decoration {
    rounding = 4
    rounding_power = 4

    # Change transparency of focused and unfocused windows
    active_opacity = 0.92
    inactive_opacity = 0.8

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 2
        passes = 4

        vibrancy = 0.1696
    }
}
